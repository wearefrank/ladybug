<div class="box">
  <div class="row top">
    <div class="w-100 h-100">
      @if (views && currentView) {
        <app-debug-table-with-controls
          [views]="views"
          [currentView]="currentView"
          (openReportEvent)="addReportToTree($event)"
          (viewChange)="onViewChange($event)"
          [reportClosed$]="reportClosedSubject"
        ></app-debug-table-with-controls>
      }
    </div>
  </div>
  <div class="border-bottom"></div>
  <div id="bottom-half" class="row bottom mb-0 pb-0 w-100">
    @if (currentView) {
      <app-debug-report #reportComponent (closeReportEvent)="reportClosedSubject.next(true)"></app-debug-report>
    }
  </div>
</div>
