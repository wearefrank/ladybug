# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  - package-ecosystem: "npm" # See documentation for possible values
    directory: "/ladybug-frontend" # Location of package manifests
    schedule:
      interval: "monthly"
    ignore:
      - dependency-name: "monaco-editor" # Upgrading monaco editor results in failing tests, ignored upgrades for now
  - package-ecosystem: "maven"
    directory: "/ladybug-common"
    schedule:
      interval: "monthly"
  - package-ecosystem: "maven"
    directory: "/ladybug-backend-jaxrs"
    schedule:
      interval: "monthly"
  - package-ecosystem: "maven"
    directory: "/ladybug-backend-springmvc"
    schedule:
      interval: "monthly"
  - package-ecosystem: "maven"
    directory: "/ladybug-ff-test-webapp"
    schedule:
      interval: "monthly"
  - package-ecosystem: "maven"
    directory: "/ladybug-frontend-servlet"
    schedule:
      interval: "monthly"
  - package-ecosystem: "maven"
    directory: "/ladybug-test-webapp"
    schedule:
      interval: "monthly"
